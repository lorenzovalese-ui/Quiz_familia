<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Dev Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="bg-white p-8 rounded-lg shadow-xl w-full max-w-2xl">
        
        <section id="screen-login" class="text-center">
            <h1 class="text-3xl font-bold mb-6 text-gray-800">Bem-vindo ao Quiz</h1>
            <input type="text" id="input-name" placeholder="Digite seu nome" class="w-full p-3 border border-gray-300 rounded mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="app.login()" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700 transition">Entrar</button>
        </section>

        <section id="screen-selection" class="hidden text-center">
            <h2 class="text-2xl font-bold mb-4">Escolha um Quiz</h2>
            <div id="quiz-list" class="space-y-3"></div>
        </section>

        <section id="screen-quiz" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="quiz-progress" class="text-sm font-semibold text-gray-500">Questão 1 de 5</span>
                <span id="user-display" class="text-sm font-bold text-blue-600"></span>
            </div>
            <h3 id="question-text" class="text-xl font-medium mb-6"></h3>
            <div id="options-container" class="space-y-4"></div>
        </section>

        <section id="screen-result" class="hidden text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Fim do Quiz!</h2>
            <p class="text-lg text-gray-600 mb-6">Sua pontuação final foi:</p>
            <div id="final-score" class="text-6xl font-black text-blue-600 mb-8">0</div>
            <div class="flex gap-4">
                <button onclick="app.loadRanking()" class="flex-1 bg-gray-800 text-white py-3 rounded font-bold hover:bg-gray-900">Ver Ranking</button>
                <button onclick="location.reload()" class="flex-1 bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">Tentar Novamente</button>
            </div>
        </section>

        <section id="screen-ranking" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-center">Ranking - Top 10</h2>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b-2 border-gray-200">
                        <th class="py-2">Usuário</th>
                        <th class="py-2 text-right">Nota</th>
                    </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>
            <button onclick="location.reload()" class="w-full mt-8 bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">Voltar ao Início</button>
        </section>

    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        const app = {
            user: '',
            currentQuizId: null,
            questions: [],
            currentIndex: 0,
            answers: [],

            async login() {
                const nameInput = document.getElementById('input-name');
                if (!nameInput.value) return alert('Insira seu nome');
                this.user = nameInput.value;
                document.getElementById('user-display').innerText = this.user;
                this.showScreen('selection');
                await this.loadQuizzes();
            },

            async loadQuizzes() {
                const response = await fetch(`${API_URL}/formularios`);
                const quizzes = await response.json();
                const container = document.getElementById('quiz-list');
                container.innerHTML = quizzes.map(q => `
                    <button onclick="app.startQuiz(${q.id})" class="w-full p-4 border border-gray-200 rounded hover:bg-blue-50 transition text-left font-medium">
                        ${q.titulo}
                    </button>
                `).join('');
            },

            async startQuiz(id) {
                this.currentQuizId = id;
                const response = await fetch(`${API_URL}/formularios/${id}/questoes`);
                this.questions = await response.json();
                this.currentIndex = 0;
                this.answers = [];
                this.showScreen('quiz');
                this.renderQuestion();
            },

            renderQuestion() {
                const question = this.questions[this.currentIndex];
                document.getElementById('quiz-progress').innerText = `Questão ${this.currentIndex + 1} de ${this.questions.length}`;
                document.getElementById('question-text').innerText = question.enunciado;

                const options = ['a', 'b', 'c', 'd'];
                const container = document.getElementById('options-container');
                container.innerHTML = options.map(opt => `
                    <button onclick="app.handleAnswer('${opt.toUpperCase()}')" class="w-full p-4 bg-gray-50 border border-gray-200 rounded text-left hover:border-blue-500 hover:bg-blue-50 transition">
                        <span class="font-bold mr-2">${opt.toUpperCase()}:</span> ${question['opcao_' + opt]}
                    </button>
                `).join('');
            },

            handleAnswer(option) {
                this.answers.push({
                    questao_id: this.questions[this.currentIndex].id,
                    opcao: option
                });

                if (this.currentIndex < this.questions.length - 1) {
                    this.currentIndex++;
                    this.renderQuestion();
                } else {
                    this.submitResults();
                }
            },

            async submitResults() {
                const response = await fetch(`${API_URL}/resultados`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        formulario_id: this.currentQuizId,
                        nome_usuario: this.user,
                        respostas: this.answers
                    })
                });
                const result = await response.json();
                document.getElementById('final-score').innerText = result.nota;
                this.showScreen('result');
            },

            async loadRanking() {
                const response = await fetch(`${API_URL}/formularios/${this.currentQuizId}/ranking`);
                const ranking = await response.json();
                const body = document.getElementById('ranking-body');
                body.innerHTML = ranking.map(r => `
                    <tr class="border-b border-gray-100">
                        <td class="py-3">${r.nome_usuario}</td>
                        <td class="py-3 text-right font-bold text-blue-600">${r.nota}</td>
                    </tr>
                `).join('');
                this.showScreen('ranking');
            },

            showScreen(screenId) {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`screen-${screenId}`).classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
